<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valerie Emotional Display</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* Base background size */
#background {
    width: 100%;
    height: 100%;
}

/* Flashing Red */
@keyframes flashRed {
    0%   { background-color: #ff0000; }
    50%  { background-color: #660000; }
    100% { background-color: #ff0000; }
}

/* Flashing Green */
@keyframes flashGreen {
    0%   { background-color: #00cc66; }
    50%  { background-color: #004d26; }
    100% { background-color: #00cc66; }
}

/* Flashing Yellow */
@keyframes flashYellow {
    0%   { background-color: #ffff00; }
    50%  { background-color: #999900; }
    100% { background-color: #ffff00; }
}

/* Flashing White */
@keyframes flashWhite {
    0%   { background-color: #ffffff; }
    50%  { background-color: #cccccc; }
    100% { background-color: #ffffff; }
}

</style>
</head>

<body>

<div id="background"></div>

<script>
const bg = document.getElementById("background");
let state = 0;
const totalStates = 8;

function updateState() {

    // Resets all colors
    bg.className = "";
    bg.removeAttribute("style");

    // makes animation restart
    void bg.offsetWidth;

    switch(state) {

        case 0: // Flashing Red
            bg.style.animation = "flashRed 1s infinite";
            break;

        case 1: // Plain Yellow
            bg.style.backgroundColor = "#ffff00";
            break;

        case 2: // Flashing Green
            bg.style.animation = "flashGreen 1s infinite";
            break;

        case 3: // Plain Red
            bg.style.backgroundColor = "#ff0000";
            break;

        case 4: // Plain Green
            bg.style.backgroundColor = "#00cc66";
            break;

       
        case 5: // Flashing Yellow
            bg.style.animation = "flashYellow 1s infinite";
            break;

        case 6: // Plain White
            bg.style.backgroundColor = "#ffffff";
            break;

        case 7: // Flashing White
            bg.style.animation = "flashWhite 1s infinite";
            break;
    }
}

// Right Arrow
document.addEventListener("keydown", function(event) {
    if (event.key === "ArrowRight") {
        state = (state + 1) % totalStates;
        updateState();
    }
});

// Left Arrow
document.addEventListener("keydown", function(event) {
    if (event.key === "ArrowLeft") {
        state = (state - 1 + totalStates) % totalStates;
        updateState();
    }
});

// Initialize
updateState();

</script>

</body>
</html>
